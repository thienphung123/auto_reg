name: Sync to Hugging Face hub
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Xóa các file ảnh gây lỗi trước khi push (vì chúng ta không cần ảnh demo để chạy tool)
          rm -rf docs/images/
          rm -f frontend/public/logo.png
          rm -f mm_facetoface_collect_qrcode_1775206373527.png
          rm -f kiro_*.png
          
          git config --global user.email "bot@huggingface.co"
          git config --global user.name "HF Sync Bot"
          git add .
          git commit -m "Remove offending binary files for sync" || echo "No changes to commit"
          git push --force https://thienphung123:$HF_TOKEN@huggingface.co/spaces/thienphung123/quan-ly-affiliate-ai main
