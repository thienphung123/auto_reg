name: Sync to Hugging Face hub
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 1. Cấu hình Bot
          git config --global user.email "bot@huggingface.co"
          git config --global user.name "HF Sync Bot"

          # 2. Tạo một bản sao code sạch (không có lịch sử file ảnh cũ)
          mkdir clean_code
          cp -R . clean_code/
          cd clean_code
          
          # 3. Xóa các file ảnh và thư mục Git cũ để làm sạch hoàn toàn
          rm -rf .git
          rm -rf docs/images/
          rm -f frontend/public/logo.png
          rm -f mm_facetoface_collect_qrcode_1775206373527.png
          rm -f kiro_*.png
          
          # 4. Khởi tạo lại Git mới từ đầu tại đây
          git init
          git add .
          git commit -m "Initial clean sync"
          
          # 5. Ép Hugging Face nhận bản sạch này
          git push --force https://thienphung123:$HF_TOKEN@huggingface.co/spaces/thienphung123/quan-ly-affiliate-ai main
